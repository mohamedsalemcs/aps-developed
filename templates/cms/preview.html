{% load static %}
<!DOCTYPE html>
<!-- APS CMS — live preview. Reads the SAME store the editor writes (localStorage).
     Save in the editor → this tab updates instantly via the storage event. -->
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>معاينة حية — APS</title>
<link rel="stylesheet" href="../../website/css/main.css" />
<style>
  body { margin: 0; }
  .pvbar { position: sticky; top: 0; z-index: 999; display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: #0e1f30; color: #fff; font: 600 13px/1.4 "Inter", system-ui, sans-serif; }
  .pvbar__dot { width: 8px; height: 8px; border-radius: 50%; background: #5fd6a0; box-shadow: 0 0 0 4px rgba(95,214,160,.18); }
  .pvbar__note { color: #9fb3c6; font-weight: 500; }
  .pvbar__spacer { flex: 1; }
  .pvbar__seg { display: inline-flex; background: rgba(255,255,255,.1); border-radius: 9px; padding: 3px; }
  .pvbar__seg button { font: inherit; cursor: pointer; border: 0; background: none; color: #cdd9e6; padding: 5px 14px; border-radius: 7px; }
  .pvbar__seg button.is-active { background: #fff; color: #0e1f30; }
  .pvbar__btn { font: inherit; cursor: pointer; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color: #fff; padding: 6px 12px; border-radius: 8px; }
  .pvbar__btn:hover { background: rgba(255,255,255,.14); }
  .pv-fallback { outline: 2px dashed #e6b450; outline-offset: 2px; }
  .pv-generic { max-width: 1180px; margin: 0 auto; padding: 56px 24px; }
  .pv-generic h2 { margin-top: 40px; }
</style>
</head>
<body>
<div class="pvbar">
  <span class="pvbar__dot"></span><span><b>معاينة حية</b> · <span id="pgLabel"></span></span>
  <span class="pvbar__note">بيانات مباشرة من اللوحة · بتتحدّث لحظة ما تحفظ</span>
  <span class="pvbar__spacer"></span>
  <span class="pvbar__seg" id="langSeg"><button data-lang="en" class="is-active">English</button><button data-lang="ar">العربية</button></span>
  <button class="pvbar__btn" id="refresh">↻ تحديث</button>
</div>
<div id="stage"></div>

{{ store_data|json_script:"aps-store-data" }}
<script>try{localStorage.setItem("aps_auth","1");}catch(e){}window.__APS_AUTHED__=1;window.__APS_CSRF__="{{ csrf_token }}";</script>
<script src="{% static 'cms/js/store.js' %}"></script>
<script>
(function () {
  var S = window.Store, PFX = "../../website/", lang = "en";
  var qs = new URLSearchParams(location.search);
  var page = qs.get("page") || "home", div = qs.get("div") || "sps";

  function esc(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function t(path) { var ar = S.get(path, "ar"), en = S.get(path, "en"); return lang === "ar" ? { text: ar || en, fb: !ar && !!en } : { text: en, fb: false }; }
  function f(path) { var o = t(path); return o.fb ? '<span class="pv-fallback">' + esc(o.text) + '</span>' : esc(o.text); }
  function hidden(path) { return !!S.get(path + ".hidden"); }

  function iconSrc(v) { return /^(data:|blob:)/.test(v || "") ? v : PFX + "assets/images/icons/" + v; }
  function imgSrc(v) { return /^(data:|blob:)/.test(v || "") ? v : PFX + "assets/images/" + v; }
  function features() {
    return S.getArray("pages.home.sections.hero.features").map(function (it) {
      var ar = it.text.ar || it.text.en, fb = lang === "ar" && !it.text.ar && it.text.en;
      var txt = lang === "ar" ? ar : it.text.en;
      return '<li class="feature-pill"><span class="feature-pill__icon"><img src="' + iconSrc(it.icon) + '" alt="" /></span><span' + (fb ? ' class="pv-fallback"' : '') + '>' + esc(txt) + '</span></li>';
    }).join("");
  }
  var CARDS = [
    ["Envirosystems", "Security, safety, and control systems integration for industrial, governmental, and commercial facilities.", "divisions/fjifoie.jpg"],
    ["Beta Machinery", "High-tech industrial machinery supply, installation, and after-sales technical support in Saudi Arabia.", "divisions/ImageWithFallback.jpg"],
    ["Saudi Projects & Supplies Co.", "Water, wastewater, and ventilation solutions, engineering support, and turnkey delivery.", "divisions/ImageWithFallback-1.jpg"],
    ["Advanced Green Solutions", "Sustainable and energy-efficient solutions supporting green projects.", "divisions/ImageWithFallback-2.jpg"],
    ["AZOLIS Middle East", "Specialized chemical solutions and technical services for water and industrial treatment.", "divisions/ImageWithFallback-3.jpg"]
  ];
  function cards() {
    return CARDS.map(function (c) {
      return '<article class="division-card"><div class="division-card__media"><img src="' + PFX + 'assets/images/' + c[2] + '" alt="" /></div>' +
        '<div class="division-card__body"><h3 class="division-card__title">' + esc(c[0]) + '</h3><p class="division-card__text">' + esc(c[1]) + '</p>' +
        '<div class="division-card__cta"><a class="btn btn--sm">Explore</a></div></div></article>';
    }).join("");
  }

  var HOME = {
    hero: function (H) {
      return '<section class="hero"><div class="container hero__grid"><div class="hero__content">' +
        '<h1 class="hero__title">' + f(H + "hero.title") + '</h1><p class="hero__lead">' + f(H + "hero.lead") + '</p>' +
        '<ul class="hero__features">' + features() + '</ul>' +
        '<div><a class="btn">' + f(H + "hero.cta") + ' <span class="btn__arrow"><img src="' + PFX + 'assets/images/icons/arrow-on-cta.svg" alt="" /></span></a></div>' +
      '</div><div class="hero__visual" aria-hidden="true">' +
        '<div class="hero__d hero__d--1"><span class="hero__d__frame"></span><figure class="hero__d__photo"><img src="' + PFX + 'assets/images/hero/Vector-2.png" alt="" /></figure></div>' +
        '<div class="hero__d hero__d--2"><span class="hero__d__frame"></span><figure class="hero__d__photo"><img src="' + PFX + 'assets/images/hero/Vector-1.png" alt="" /></figure></div>' +
        '<div class="hero__d hero__d--3"><span class="hero__d__frame"></span><figure class="hero__d__photo"><img src="' + PFX + 'assets/images/hero/Vector.png" alt="" /></figure></div>' +
      '</div></div></section>';
    },
    about: function (H) {
      return '<section class="about section"><div class="container"><div class="about__wrap">' +
        '<span class="about__panel" aria-hidden="true"></span><img class="about__watermark" src="' + PFX + 'assets/images/brand/logo-as-pattern-in-bg.svg" alt="" />' +
        '<div class="about__grid"><div class="about__body"><span class="eyebrow eyebrow--start">' + f(H + "about.eyebrow") + '</span>' +
        '<h2 class="section-title">' + f(H + "about.title") + '</h2><div class="about__text"><p>' + f(H + "about.body") + '</p></div>' +
        '<div><a class="btn">' + f(H + "about.cta") + ' <span class="btn__arrow"><img src="' + PFX + 'assets/images/icons/arrow-on-cta.svg" alt="" /></span></a></div></div>' +
        '<div class="about__media"><img src="' + PFX + 'assets/images/home-about-us-image.png" alt="" /></div></div></div></div></section>';
    },
    divisions: function (H) {
      return '<section class="divisions section"><div class="container"><div class="divisions__head">' +
        '<h2 class="section-title">' + f(H + "divisions.title") + '</h2><p class="section-subtitle">' + f(H + "divisions.subtitle") + '</p></div>' +
        '<div class="divisions__grid">' + cards() + '</div></div></section>';
    },
    partners: function (H) {
      var logos = S.getArray("partners.items").map(function (it) {
        return '<img src="' + imgSrc(it.img) + '" alt="' + esc(it.name) + '" title="' + esc(it.name) + '" style="height:44px;max-width:130px;object-fit:contain" />';
      }).join("");
      return '<section class="partners section"><div class="container partners__head">' +
        '<h2 class="section-title">' + f(H + "partners.title") + '</h2><p class="section-subtitle">' + f(H + "partners.subtitle") + '</p></div>' +
        '<div style="display:flex;gap:46px;justify-content:center;align-items:center;flex-wrap:wrap;padding:8px 24px 34px">' + logos + '</div></section>';
    },
    contact: function (H) {
      return '<section class="section" style="padding:64px 24px;text-align:center"><div class="container">' +
        '<h2 class="section-title">' + f(H + "contact.title") + '</h2><p class="section-subtitle">' + f(H + "contact.subtitle") + '</p></div></section>';
    }
  };
  function renderHome() {
    var H = "pages.home.sections.";
    var order = S.getArray("pages.home.order"); if (!order.length) order = ["hero", "about", "divisions", "partners", "contact"];
    return order.map(function (k) { return (HOME[k] && !hidden(H + k)) ? HOME[k](H) : ""; }).join("");
  }

  function banner(eyebrowP, titleP, bg) {
    var bgs = bg ? ' style="background-image:linear-gradient(rgba(0,0,0,.42),rgba(0,0,0,.42)),url(' + PFX + bg + ');background-size:cover;background-position:center"' : '';
    return '<section class="page-banner"' + bgs + '><div class="container page-banner__inner"><span class="eyebrow">' + f(eyebrowP) + '</span><h1 class="page-banner__title">' + f(titleP) + '</h1></div></section>';
  }
  function gsection(titleP, bodyP) { return '<h2 class="section-title">' + f(titleP) + '</h2><p>' + f(bodyP) + '</p>'; }

  function renderAbout() {
    var A = "pages.about.sections.";
    return banner(A + "banner.eyebrow", A + "banner.title", "banners/about.jpg") +
      '<div class="pv-generic">' + gsection(A + "who.title", A + "who.body") + gsection(A + "foundation.title", A + "foundation.body") + gsection(A + "principles.title", A + "principles.body") + '</div>';
  }
  function renderContact() {
    var C = "pages.contact.sections.";
    return banner(C + "banner.eyebrow", C + "banner.title", "banners/about.jpg") +
      '<div class="pv-generic">' + gsection(C + "form.heading", C + "form.submit") + gsection(C + "info.heading", "settings has the details") + '</div>';
  }
  function projectsGrid(B) {
    var items = S.getArray(B + "projects.items");
    if (!items.length || hidden(B + "projects")) return "";
    var cards = items.map(function (it) {
      var t = lang === "ar" ? (it.title.ar || it.title.en) : it.title.en;
      var fb = lang === "ar" && !it.title.ar && it.title.en;
      return '<figure style="margin:0;border-radius:14px;overflow:hidden;border:1px solid #e4e9f0;background:#fff">' +
        '<img src="' + imgSrc(it.img) + '" alt="" style="width:100%;height:170px;object-fit:cover;display:block" />' +
        '<figcaption style="padding:12px 14px;font-weight:600;font-size:14px"' + (fb ? ' class="pv-fallback"' : '') + '>' + esc(t) + '</figcaption></figure>';
    }).join("");
    return '<h2 class="section-title" style="margin-top:40px">' + f(B + "projects.title") + '</h2>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;margin-top:18px">' + cards + '</div>';
  }
  function renderDivision() {
    var D = "divisions." + div, B = D + ".sections.";
    var nm = f(D + ".name");
    var bg = "banners/" + (div === "sps" ? "sps.jpg" : div === "beta" ? "beta.jpg" : div === "enviro" ? "enviro.jpg" : div === "ags" ? "green.jpg" : "azolis.jpg");
    return '<section class="page-banner" style="background-image:linear-gradient(rgba(0,0,0,.42),rgba(0,0,0,.42)),url(' + PFX + 'assets/images/' + bg + ');background-size:cover;background-position:center">' +
      '<div class="container page-banner__inner"><span class="eyebrow">' + f(B + "banner.subtitle") + '</span><h1 class="page-banner__title">' + nm + '</h1></div></section>' +
      '<div class="pv-generic">' + gsection(B + "about.title", B + "about.body") + gsection(B + "systems.title", B + "systems.subtitle") + projectsGrid(B) + '</div>';
  }

  var LABEL = { home: "الرئيسية", about: "عن الشركة", contact: "اتصل بنا", division: "قسم" };
  function render() {
    S.reload();
    var stage = document.getElementById("stage");
    stage.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
    stage.setAttribute("lang", lang);
    document.getElementById("pgLabel").textContent = (page === "division" ? (S.get("divisions." + div + ".name", "ar") || S.get("divisions." + div + ".name", "en")) : LABEL[page] || page);
    stage.innerHTML = page === "about" ? renderAbout() : page === "contact" ? renderContact() : page === "division" ? renderDivision() : renderHome();
  }

  document.getElementById("langSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    lang = b.getAttribute("data-lang");
    Array.prototype.forEach.call(this.children, function (x) { x.classList.toggle("is-active", x === b); });
    render();
  });
  document.getElementById("refresh").addEventListener("click", render);
  window.addEventListener("storage", function (e) { if (e.key === S.KEY) render(); });
  render();
})();
</script>
</body>
</html>
